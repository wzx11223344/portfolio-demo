<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>政策数据分析 · 产业调研 · 合规审计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e8;font-family:'Segoe UI','Microsoft YaHei',sans-serif}
canvas{display:block;width:100%;height:auto;background:#050508}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(circle at 30% 30%,#1a0a2e 0%,#0a0a0f 70%)}
.container{max-width:1100px;margin:0 auto;padding:20px}
nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:30px;padding:12px}
nav a{color:#888;text-decoration:none;padding:6px 14px;font-size:12px;font-family:monospace;border:1px solid #222;border-radius:6px;transition:.3s}
nav a:hover{color:#a855f7;border-color:#a855f7;box-shadow:0 0 12px rgba(168,85,247,.15)}
.hero{text-align:center;padding:40px 0}
h1{font-size:clamp(32px,5vw,52px);font-weight:700;background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#666;font-size:13px;font-family:monospace}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.stat{background:#111;border:1px solid #1a1a2e;border-radius:8px;padding:14px 20px;text-align:center;min-width:90px}
.stat-num{font-size:26px;font-weight:700;font-family:monospace;color:#a855f7}.stat-lbl{font-size:10px;color:#555}
.card{background:#0d0d18;border:1px solid #1a1a2e;border-radius:12px;padding:24px;margin-bottom:20px}
.card-title{font-family:monospace;font-size:14px;color:#a855f7;margin-bottom:16px;letter-spacing:1px}.card-title span{color:#3b82f6}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:6px 14px;border:1px solid #222;background:#111;color:#888;border-radius:6px;cursor:pointer;font-family:monospace;font-size:11px;transition:.2s}
.btn:hover{border-color:#a855f7;color:#a855f7}.btn-primary{border-color:#a855f7;color:#a855f7}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
.stat-line{display:flex;justify-content:space-between;padding:4px 0;font-family:monospace;font-size:11px;color:#888;border-bottom:1px solid #111}
.stat-line span{color:#e0e0e8}
.footer{text-align:center;padding:40px;font-size:11px;color:#444;font-family:monospace}
</style>
</head>
<body>
<div id="bg"></div>
<div class="container">
<nav><a>政策分析</a><a>产业调研</a><a>合规审查</a><a>数据治理</a></nav>
<div class="hero">
<h1>政策分析与合规审计平台</h1>
<div class="sub">// 产业政策研究 · 数据治理 · 规范建设 · 流程优化</div>
<div class="stats">
<div class="stat"><div class="stat-num">95%</div><div class="stat-lbl">审核通过率</div></div>
<div class="stat"><div class="stat-num" id="compliance-score">0</div><div class="stat-lbl">合规得分</div></div>
<div class="stat"><div class="stat-num">15+</div><div class="stat-lbl">实地调研企业</div></div>
</div></div>

<div class="grid-2">
<div class="card">
<div class="card-title"><span>#</span> 产业政策分析 · 主题建模 + 关键词提取</div>
<canvas id="policy-canvas" width="500" height="340"></canvas>
<div class="controls" style="margin-top:8px">
<button class="btn btn-primary" id="analyze-btn">▶ 政策分析</button>
<button class="btn" id="reset-policy">↻ 重置</button>
</div>
<div class="stat-line">政策主题<span id="topic-count">0</span><span>关键词<span id="kw-total">0</span></span><span>关联度<span id="rel-score">0%</span></span></div>
</div>

<div class="card">
<div class="card-title"><span>#</span> 合规检查表 · 逐项评分</div>
<div id="compliance-list" style="font-family:monospace;font-size:11px"></div>
<button class="btn btn-primary" id="audit-btn" style="margin-top:12px">▶ 执行合规审计</button>
</div></div>

<div class="card">
<div class="card-title"><span>#</span> 技术体系 · 国企数字化</div>
<div class="grid-3">
<div style="background:#111;border-radius:8px;padding:14px">
<div style="color:#a855f7;font-size:11px;font-family:monospace">公文写作与管理</div>
<div class="stat-line">收发登记·台账管理·会议纪要·归档<span>95%</span></div></div>
<div style="background:#111;border-radius:8px;padding:14px">
<div style="color:#3b82f6;font-size:11px;font-family:monospace">政策调研与报告</div>
<div class="stat-line">产业分析·走访调研·信息归纳·报告撰写<span>92%</span></div></div>
<div style="background:#111;border-radius:8px;padding:14px">
<div style="color:#00ff88;font-size:11px;font-family:monospace">合规与安全</div>
<div class="stat-line">法规检索·合同分析·数据脱敏·风险评估<span>85%</span></div></div></div></div>

<div class="footer"><a href="https://github.com/wzx11223344" style="color:#a855f7;text-decoration:none">github.com/wzx11223344</a> · 万值翔 · 经信委实习 · 产业调研</div>
</div>

<script>
// ═══ Policy Analysis ═══  
const pc=document.getElementById('policy-canvas'),pctx=pc.getContext('2d');
const pw=500,ph=340;
const topics=['智能制造','新能源','高端装备','数字经济','双碳','人工智能','生物医药','集成电路'];
const keywords=['数字化转型','绿色制造','产业升级','创新驱动','高质量发展','供给侧改革','新质生产力','链长制','专精特新'];

function drawPolicy(data){
  pctx.fillStyle='#050508';pctx.fillRect(0,0,pw,ph);
  if(!data)return;
  data.topics.forEach((t,i)=>{
    const x=20+(i%4)*120,y=40+Math.floor(i/4)*100;
    const r=t.weight*30+15;
    const hue=270+Math.floor(t.weight*60);
    pctx.fillStyle=`hsl(${hue},80%,50%)`;
    pctx.beginPath();pctx.arc(x+60,y,r,0,Math.PI*2);pctx.fill();
    pctx.fillStyle='#fff';pctx.font='8px monospace';pctx.textAlign='center';
    pctx.fillText(t.name,x+60,y+2);
    pctx.fillStyle='#aaa';pctx.font='7px monospace';
    pctx.fillText(Math.round(t.weight*100)+'%',x+60,y+r+12);
  });
  // Keywords
  pctx.fillStyle='#555';pctx.font='8px monospace';pctx.textAlign='center';
  pctx.fillText('政策关键词频率',pw/2,ph-15);
  data.keywords.slice(0,7).forEach((kw,i)=>{
    const x=30+i*65,y=ph-60;
    pctx.fillStyle='rgba(168,85,247,.5)';
    pctx.fillRect(x,y-kw.weight*30,30,kw.weight*30);
    pctx.fillStyle='#888';pctx.font='6px monospace';pctx.textAlign='center';
    pctx.fillText(kw.word,x+15,ph-50);
  });
}

function generateAnalysis(){
  const tCount=3+Math.floor(Math.random()*3);
  const myTopics=topics.sort(()=>Math.random()-0.5).slice(0,tCount).map(t=>({name:t,weight:0.5+Math.random()*0.5}));
  const kw=keywords.sort(()=>Math.random()-0.5).slice(0,3+Math.floor(Math.random()*3)).map(w=>({word:w,weight:0.3+Math.random()*0.7}));
  return {topics:myTopics,keywords:kw};
}
drawPolicy(generateAnalysis());

document.getElementById('analyze-btn').onclick=()=>{
  const data=generateAnalysis();
  drawPolicy(data);
  document.getElementById('topic-count').textContent=data.topics.length;
  document.getElementById('kw-total').textContent=data.keywords.reduce((s,k)=>s+k.weight*100,0).toFixed(0);
  document.getElementById('rel-score').textContent=(70+Math.random()*25).toFixed(0)+'%';
  document.getElementById('compliance-score').textContent=Math.floor(70+Math.random()*25);
};
document.getElementById('reset-policy').onclick=()=>{
  pctx.fillStyle='#050508';pctx.fillRect(0,0,pw,ph);
  document.getElementById('topic-count').textContent='0';
  document.getElementById('rel-score').textContent='0%';
};

// ═══ Compliance Checklist ═══
const items=[
  {name:'数据安全管理规范',passed:true,weight:20},
  {name:'公文格式标准化',passed:true,weight:15},
  {name:'档案管理制度',passed:true,weight:15},
  {name:'信息公开透明度',passed:false,weight:10},
  {name:'内部审计流程',passed:true,weight:20},
  {name:'信息安全等级保护',passed:false,weight:10},
  {name:'合同审查合规',passed:true,weight:10}
];
function renderCompliance(isAudit){
  const el=document.getElementById('compliance-list');el.innerHTML='';
  let score=0,total=0,tCount=0,rCount=0;
  items.forEach(item=>{
    if(isAudit){item.passed=Math.random()>0.25;}
    const d=document.createElement('div');d.className='stat-line';
    const icon=item.passed?'✓':'✗';
    d.innerHTML=`<span style="color:${item.passed?'#0f0':'#f44'}">${icon} ${item.name}</span><span>${item.passed?'通过':'未通过'} | ${item.weight}分</span>`;
    el.appendChild(d);
    if(item.passed)score+=item.weight;
    total+=item.weight;tCount++;
    if(item.passed)rCount++;
  });
  const pct=Math.round(score/total*100);
  document.getElementById('compliance-score').textContent=pct;
}
renderCompliance(false);
document.getElementById('audit-btn').onclick=()=>renderCompliance(true);
</script>
</body>
</html>
